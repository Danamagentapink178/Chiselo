name: Feature request
description: Suggest an improvement for Chiselo.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Chiselo do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Direct HTML editing
        - Selection and layout controls
        - Text editing
        - Image tools
        - Table tools
        - PDF export
        - PPTX export
        - Packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Screenshots, sample HTML, or comparable tools.
    validations:
      required: false
