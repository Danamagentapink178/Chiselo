name: Bug report
description: Report a reproducible Chiselo problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open this HTML...
        2. Select this element...
        3. Export...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Chiselo version or commit
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: false
  - type: textarea
    id: artifacts
    attributes:
      label: Sample HTML, screenshots, or exported files
      description: Attach only files that you are allowed to share.
    validations:
      required: false
